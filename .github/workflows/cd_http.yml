name: Deploy HTTP Backend

on:
  push:
    branches: [main]
    paths:
      - "apps/http-backend/**"
      - "packages/**"
      - "docker/Dockerfile.http-backend"
      - ".github/workflows/cd_http.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push http-backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.http-backend
          provenance: false
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/drawapp-http:latest
            ${{ secrets.DOCKER_USERNAME }}/drawapp-http:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

