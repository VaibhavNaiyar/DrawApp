name: Deploy WebSocket Server

on:
  push:
    branches: [main]
    paths:
      - "apps/ws-backend/**"
      - "packages/**"
      - "docker/Dockerfile.websocket"
      - ".github/workflows/cd_ws.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push websocket image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.websocket
          provenance: false
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/drawapp-websocket:latest
            ${{ secrets.DOCKER_USERNAME }}/drawapp-websocket:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

