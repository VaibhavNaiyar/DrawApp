version: "3.9"

# ─── DrawApp — Local Development Stack ───────────────────────────────────────
# For production, DATABASE_URL should point to Neon (or your hosted Postgres).
# For local dev, the `db` service spins up a local Postgres instance.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drawapp
      POSTGRES_USER: drawapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawapp_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  http-backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.http-backend
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  websocket:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.websocket
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
      args:
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
        NEXT_PUBLIC_HTTP_URL: ${NEXT_PUBLIC_HTTP_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      - http-backend
      - websocket
    restart: unless-stopped

volumes:
  postgres_data:
