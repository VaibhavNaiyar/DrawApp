version: "3.9"

services:
  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: drawapp
      POSTGRES_USER: drawapp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drawapp_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # host:container — 5433 avoids conflicts with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── DB migrations (one-shot, exits after applying pending migrations) ────────
  migrate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ── HTTP backend (REST API + auth) ───────────────────────────────────────────
  http-backend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.http-backend
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Chat WebSocket (reference / learning backend — never remove) ─────────────
  websocket:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.websocket
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Drawing WebSocket (real-time canvas backend) ─────────────────────────────
  draw-ws:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.draw-ws
    ports:
      - "8081:8081"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
      AUTH_SECRET: ${AUTH_SECRET}
      DRAW_WS_PORT: 8081
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
      args:
        DATABASE_URL: ${DATABASE_URL}
        AUTH_SECRET: ${AUTH_SECRET}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
        NEXT_PUBLIC_DRAW_WS_URL: ${NEXT_PUBLIC_DRAW_WS_URL:-ws://localhost:8081}
        NEXT_PUBLIC_HTTP_URL: ${NEXT_PUBLIC_HTTP_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: postgresql://drawapp:${POSTGRES_PASSWORD:-drawapp_dev}@db:5432/drawapp
    depends_on:
      - http-backend
      - draw-ws
    restart: unless-stopped

volumes:
  postgres_data:
